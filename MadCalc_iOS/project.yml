name: MadCalc_iOS
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 9
    MARKETING_VERSION: 0.3.6
    PRODUCT_NAME: MadCalc
    PRODUCT_BUNDLE_IDENTIFIER: pl.madmagsystem.madcalc.ios
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: MadCalc
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIRequiresFullScreen: NO
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
targets:
  MadCalc:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 1,2
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
  MadCalcTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: MadCalc
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: MadCalcTests
        PRODUCT_MODULE_NAME: MadCalcTests
        PRODUCT_BUNDLE_IDENTIFIER: pl.madmagsystem.madcalc.ios.tests
schemes:
  MadCalc:
    build:
      targets:
        MadCalc: all
        MadCalcTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: MadCalcTests
    archive:
      config: Release
